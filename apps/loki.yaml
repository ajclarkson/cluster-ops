---
apiVersion: v1
kind: Namespace
metadata:
  name: loki
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-loki-credentials 
  namespace: loki
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
  data:
  - secretKey: MINIO_ACCESS_KEY_ID
    remoteRef:
      key: "minio-loki-credentials"
      property: username
  - secretKey: MINIO_SECRET_ACCESS_KEY
    remoteRef:
      key: "minio-loki-credentials"
      property: password
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled # this is required to prevent flux overwriting the env variable strings
spec:
  chart:
    spec:
      chart: loki
      version: "6.42.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: loki
  targetNamespace: loki
  values:
    chunksCache:
      enabled: false
    loki:
      auth_enabled: false

      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks
          ruler: loki-ruler

        s3:
          s3ForcePathStyle: true
          endpoint: http://minio.minio.svc.cluster.local:9000
          secretAccessKey: ${MINIO_SECRET_ACCESS_KEY}
          accessKeyId: ${MINIO_ACCESS_KEY_ID}
     
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

    deploymentMode: SimpleScalable

    # Configuration for the write
    write:
      replicas: 2
      persistence:
        size: 1Gi

      # Enable environment variables in config file
      # https://grafana.com/docs/loki/latest/configuration/#use-environment-variables-in-the-configuration
      extraArgs:
        - '-config.expand-env=true'
      extraEnvFrom:
        - secretRef:
            name: minio-loki-credentials


    # Configuration for the read
    read:
      replicas: 2
      persistence:
        size: 1Gi

      # Enable environment variables in config file
      # https://grafana.com/docs/loki/latest/configuration/#use-environment-variables-in-the-configuration
      extraArgs:
         - '-config.expand-env=true'
      extraEnvFrom:
        - secretRef:
            name: minio-loki-credentials


    # Configuration for the backend
    backend:
      replicas: 3
      persistence:
        size: 1Gi

      # Enable environment variables in config file
      # https://grafana.com/docs/loki/latest/configuration/#use-environment-variables-in-the-configuration
      extraArgs:
        - '-config.expand-env=true'
      extraEnvFrom:
        - secretRef:
            name: minio-loki-credentials


    # Configuration for the gateway
    gateway:
      enabled: true
      replicas: 1

    minio:
      enabled: false

    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
    lokiCanary:
      enabled: false

    # Disable helm-test
    test:
      enabled: false
