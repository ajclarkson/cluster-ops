---
apiVersion: v1
kind: Namespace
metadata:
  name: loki
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
spec:
  chart:
    spec:
      chart: loki
      version: "6.27.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: loki
  targetNamespace: loki
  values:
    chunksCache:
      enabled: false
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1

      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks
          ruler: loki-ruler

        s3:
          s3forcepathstyle: true
          endpoint: https://loki.user:2LZpMXybz6zguYdfP7h3@minio.minio.svc.cluster.local:9000

      storage_config:
        tsdb_shipper:
          active_index_directory: /var/loki/index
          cache_location: /var/loki/cache
          cache_ttl: 24h

      schemaConfig:
        configs:
          - from: "2025-06-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: index_
              period: 24h

      compactor:
        retention_enabled: true
        delete_request_store: s3

      ruler:
        replicas: 1
        enable_api: true
        storage:
          type: s3

          s3:
            region: null
            bucketnames: loki-ruler
            s3forcepathstyle: true

        alertmanager_url: http://mimir-alertmanager/alertmanager

      limits_config:
        allow_structured_metadata: true
        retention_period: 672h # 28 days

      ingester:
        chunk_idle_period: 30s #5m
        max_chunk_age: 1m #1h
        wal:
          flush_on_shutdown: true


    minio:
      enabled: false

    lokiCanary:
      enabled: false
    test:
      enabled: false
    deploymentMode: SingleBinary

    singleBinary:
      replicas: 1

    # Zero out replica counts of other deployment modes
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0

