---
apiVersion: v1
kind: Namespace
metadata:
  name: loki
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-loki-credentials
  namespace: loki
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ACCESS_KEY_ID
      remoteRef:
        key: "minio-loki-credentials"
        property: username
    - secretKey: MINIO_SECRET_ACCESS_KEY
      remoteRef:
        key: "minio-loki-credentials"
        property: password
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled # this is required to prevent flux overwriting the env variable strings
spec:
  chart:
    spec:
      chart: loki
      version: "7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: loki
  targetNamespace: loki
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1
  values:
    chunksCache:
      enabled: false
    loki:
      commonConfig:
        replication_factor: 1
      auth_enabled: false
      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks
          ruler: loki-ruler
        s3:
          s3ForcePathStyle: true
          endpoint: http://minio.minio:9000
          secretAccessKey: ${MINIO_SECRET_ACCESS_KEY}
          accessKeyId: ${MINIO_ACCESS_KEY_ID}
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        retention_period: 336h #14 days
        retention_stream:
          - selector: '{namespace="home-assistant"}'
            priority: 2
            period: 720h # 30 days
          - selector: '{namespace="node-red"}'
            priority: 1
            period: 9600h # 400 days
      compactor:
        retention_enabled: true
        delete_request_store: s3
        working_directory: /tmp/loki-compactor

    # Set replication to 1 to simplify and reduce resource usage
    deploymentMode: SimpleScalable

    compactor:
      enabled: true

    write:
      replicas: 1
      persistence:
        size: 1Gi
      extraArgs:
        - '-config.expand-env=true'
      extraEnvFrom:
        - secretRef:
            name: minio-loki-credentials
      resources:
        requests:
          memory: 256Mi
        limits:
          memory: 512Mi

    read:
      replicas: 1
      persistence:
        size: 1Gi
      extraArgs:
        - '-config.expand-env=true'
      extraEnvFrom:
        - secretRef:
            name: minio-loki-credentials
      resources:
        requests:
          memory: 256Mi
        limits:
          memory: 512Mi

    backend:
      replicas: 1
      persistence:
        size: 1Gi
      extraArgs:
        - '-config.expand-env=true'
      extraEnvFrom:
        - secretRef:
            name: minio-loki-credentials
      resources:
        requests:
          memory: 256Mi
        limits:
          memory: 1Gi

    gateway:
      enabled: true
      replicas: 1

    minio:
      enabled: false

    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false

    lokiCanary:
      enabled: false

    # Disable helm-test
    test:
      enabled: false
