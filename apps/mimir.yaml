---
apiVersion: v1
kind: Namespace
metadata:
  name: mimir
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-mimir-credentials
  namespace: mimir
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ACCESS_KEY_ID
      remoteRef:
        key: "minio-mimir-credentials"
        property: username
    - secretKey: MINIO_SECRET_ACCESS_KEY
      remoteRef:
        key: "minio-mimir-credentials"
        property: password
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: mimir
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  chart:
    spec:
      chart: mimir-distributed
      version: "6.0.6"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: mimir
  targetNamespace: mimir
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1
  values:
    global:
      extraEnvFrom:
        - secretRef:
            name: minio-mimir-credentials

    mimir:
      structuredConfig:
        ingest_storage:
          enabled: false
        ingester:
          push_grpc_method_enabled: true
        blocks_storage:
          backend: s3
          s3:
            endpoint: "minio.minio.svc.cluster.local:9000"
            access_key_id: ${MINIO_ACCESS_KEY_ID}
            secret_access_key: ${MINIO_SECRET_ACCESS_KEY}
            bucket_name: "mimir"
            insecure: true
        compactor:
          compaction_interval: 2h
        limits:
          ingestion_rate: 100000
          ingestion_burst_size: 100000
          max_label_names_per_series: 120
          max_global_series_per_user: 1000000
          compactor_blocks_retention_period: 24h

    ingester:
      replicas: 2
      persistentVolume:
        enabled: true
        accessModes:
          - ReadWriteOnce
        size: 5Gi
      resources:
        requests:
          memory: 256Mi
          cpu: 200m
        limits:
          memory: 512Mi
          cpu: 400m
      zoneAwareReplication:
        enabled: false

    distributor:
      replicas: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 200m
        limits:
          memory: 512Mi
          cpu: 400m

    compactor:
      replicas: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 200m
        limits:
          memory: 512Mi
          cpu: 400m

    querier:
      replicas: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 200m
        limits:
          memory: 512Mi
          cpu: 400m

    query_frontend:
      replicas: 1
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 250m

    store_gateway:
      replicas: 1
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 250m

    ruler:
      enabled: false
    alertmanager:
      enabled: false
    minio:
      enabled: false
    kafka:
      enabled: false
    ingest_storage:
      enabled: false
    metaMonitoring:
      dashboards:
        enabled: false
      serviceMonitor:
        enabled: false
