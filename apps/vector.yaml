---
apiVersion: v1
kind: Namespace
metadata:
  name: vector
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: vector
data:
  vector.yaml: |
    data_dir: /vector-data-dir

    sources:
      mqtt_home_events:
        type: mqtt
        address: tcp://mqtt-mosquitto.mqtt.svc.cluster.local:1883
        topics:
          - home/events
        client_id: vector-loki-bridge
        qos: 0

    transforms:
      parse_json:
        type: remap
        inputs: [mqtt_home_events]
        source: |
          # mqtt source provides the payload in .message
          . = parse_json!(.message)

    sinks:
      loki:
        type: loki
        inputs: [parse_json]
        endpoint: http://loki-gateway.loki.svc.cluster.local:3100
        encoding:
          codec: json

        # Low-cardinality labels only
        labels:
          subsystem: "{{ subsystem }}"
          location: "{{ location }}"
          event_type: "{{ event_type }}"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: vector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vector
  namespace: vector
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vector
  namespace: vector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vector
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: vector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  namespace: vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: vector
      containers:
        - name: vector
          image: timberio/vector:0.45.0-alpine
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/vector/vector.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /vector-data-dir
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: data
          emptyDir: {}
