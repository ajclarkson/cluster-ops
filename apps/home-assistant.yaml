---
apiVersion: v1
kind: Namespace
metadata:
  name: home-assistant
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: home-assistant-config
  namespace: home-assistant
  labels:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/name: home-assistant
  annotations:
    recurring-job-group.longhorn.io/critical: enabled
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "10Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
  annotations:
spec:
  type: ClusterIP
  ports:
  - port: 8123
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/instance: home-assistant
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-sonos
  namespace: home-assistant
  labels:
  annotations:
spec:
  type: LoadBalancer
  loadBalancerIP: "${sonos_advertise_ip}"
  ports:
  - port: 1400
    targetPort: 1400
    protocol: TCP
    name: sonos-advertise
  selector:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/instance: home-assistant
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant-internal
  namespace: home-assistant
  annotations:
    nginx.org/websocket-services: home-assistant
spec:
  tls:
    - hosts:
        - home.${local_ingress_domain}

  ingressClassName: nginx
  rules:
  - host: home.${local_ingress_domain}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-assistant
            port:
              number: 8123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/name: home-assistant
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
      app.kubernetes.io/instance: home-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: home-assistant
        app.kubernetes.io/instance: home-assistant
    spec:
      serviceAccountName: default
      automountServiceAccountToken: true
      enableServiceLinks: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # Prefer not to schedule Home Assistant on the observability node(s)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: workload
                    operator: NotIn
                    values:
                      - observability

      initContainers:
        - name: git-sync-init
          image: "registry.k8s.io/git-sync/git-sync:v4.4.0"
          imagePullPolicy: IfNotPresent
          args:
            - --repo=https://github.com/ajclarkson/homeassistant-config
            - --branch=main
            - --root=/git-config
            - --link=current
            - --depth=0
            - --one-time
          volumeMounts:
            - name: git-config
              mountPath: /git-config
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi

      containers:
        - name: home-assistant
          image: "ghcr.io/home-assistant/home-assistant:2026.7.2"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: null
          env:
            - name: "TZ"
              value: "${cluster_tz}"
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: git-config
              mountPath: /git-config
              readOnly: true
            - name: ha-secrets
              mountPath: /config/secrets.yaml
              subPath: secrets.yaml
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
          resources:
            requests:
              memory: "2Gi"
            limits:
              memory: "2Gi"
        - name: git-sync
          image: "registry.k8s.io/git-sync/git-sync:v4.4.0"
          imagePullPolicy: IfNotPresent
          args:
            - --repo=https://github.com/ajclarkson/homeassistant-config
            - --branch=main
            - --root=/git-config
            - --link=current
            - --depth=0
            - --period=60s
            - --exechook-command=/hooks/reload.sh
            - --exechook-timeout=30s
          volumeMounts:
            - name: git-config
              mountPath: /git-config
            - name: ha-reload-hook
              mountPath: /hooks
              readOnly: true
            - name: ha-reload-token
              mountPath: /secrets/ha-token
              readOnly: true
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
        - name: git-config
          emptyDir: {}
        - name: ha-reload-hook
          configMap:
            name: ha-reload-hook
            defaultMode: 0755
        - name: ha-reload-token
          secret:
            secretName: ha-reload-token
        - name: ha-secrets
          secret:
            secretName: ha-secrets

