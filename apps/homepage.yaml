---
apiVersion: v1
kind: Namespace
metadata:
  name: homepage
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  chart:
    spec:
      chart: homepage
      version: "2.1.0"
      sourceRef:
        kind: HelmRepository
        name: jameswynn
        namespace: flux-system
  interval: 15m
  releaseName: homepage
  targetNamespace: homepage
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1
  values:
    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        annotations:
          nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
          nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"
        hosts:
          - host: status.${local_ingress_domain}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - status.${local_ingress_domain}

    config:
      settings:
        title: Rackman
        layout:
          Home Automation:
            style: row
            columns: 4
          Observability:
            style: row
            columns: 4
          Infrastructure:
            style: row
            columns: 4

      widgets:
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: rackman
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true

      services:
        - Home Automation:
            - Home Assistant:
                href: https://home.${local_ingress_domain}
                description: Home automation hub
                icon: home-assistant.svg
            - Zigbee2MQTT:
                href: https://hub.${local_ingress_domain}
                description: Zigbee coordinator
                icon: zigbee2mqtt.svg
            - Node-RED:
                href: https://red.${local_ingress_domain}
                description: Automation flows
                icon: node-red.svg
            - Frigate:
                href: https://frigate.${local_ingress_domain}
                description: NVR
                icon: frigate.svg

        - Observability:
            - Grafana:
                href: https://grafana.${local_ingress_domain}
                description: Dashboards
                icon: grafana.svg
            - Goldilocks:
                href: https://goldilocks.${local_ingress_domain}
                description: Resource recommendations
                icon: kubernetes.svg

        - Infrastructure:
            - Longhorn:
                href: https://longhorn.${local_ingress_domain}
                description: Distributed storage
                icon: longhorn.svg
            - Keycloak:
                href: https://sso.${local_ingress_domain}
                description: Identity provider
                icon: keycloak.svg
            - MinIO:
                href: https://minio.${local_ingress_domain}
                description: Object storage
                icon: minio.svg
            - Homerun:
                href: https://homerun.${local_ingress_domain}
                description: Home dashboard
                icon: home.svg

    kubernetes:
      mode: cluster
