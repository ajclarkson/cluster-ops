---
apiVersion: v1
kind: Namespace
metadata:
  name: homerun
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homerun-secrets-file
  namespace: homerun
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
    template:
      data:
        secrets.yaml: |
          ha_token: {{ .token }}
  data:
    - secretKey: token
      remoteRef:
        key: "homeassistant-homerun-token"
        property: token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homerun-config
  namespace: homerun
data:
  configuration.yaml: |
    homeassistant:
      url: http://home-assistant.home-assistant:8123
      token: !secret ha_token

    mqtt:
      url: mqtt://mqtt-mosquitto.mqtt:1883

    automations:
      dir: /sync/automations

    options:
      dry_run: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homerun
  namespace: homerun
  labels:
    app.kubernetes.io/name: homerun
    app.kubernetes.io/instance: homerun
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homerun
      app.kubernetes.io/instance: homerun
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homerun
        app.kubernetes.io/instance: homerun
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: homerun
          image: ghcr.io/ajclarkson/homerun:edge
          imagePullPolicy: Always
          ports:
            - containerPort: 7070
              name: api
          env:
            - name: HOMERUN_CONFIG
              value: /config/configuration.yaml
          livenessProbe:
            httpGet:
              path: /health/live
              port: 7070
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 7070
            initialDelaySeconds: 5
          volumeMounts:
            - name: automations
              mountPath: /sync
            - name: config
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
              readOnly: true
            - name: secrets
              mountPath: /config/secrets.yaml
              subPath: secrets.yaml
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          args:
            - --repo=https://github.com/ajclarkson/homerun-automations
            - --root=/sync
            - --link=automations
            - --period=60s
            - --webhook-url=http://localhost:7070/reload
          volumeMounts:
            - name: automations
              mountPath: /sync
          securityContext:
            runAsNonRoot: true
            runAsUser: 65533
          resources:
            requests:
              memory: "32Mi"
            limits:
              memory: "64Mi"
      volumes:
        - name: automations
          emptyDir: {}
        - name: config
          configMap:
            name: homerun-config
        - name: secrets
          secret:
            secretName: homerun-secrets-file
---
apiVersion: v1
kind: Service
metadata:
  name: homerun
  namespace: homerun
spec:
  selector:
    app.kubernetes.io/name: homerun
    app.kubernetes.io/instance: homerun
  ports:
    - name: api
      port: 7070
      targetPort: api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homerun
  namespace: homerun
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - homerun.${local_ingress_domain}
  rules:
    - host: homerun.${local_ingress_domain}
      http:
        paths:
          - pathType: ImplementationSpecific
            backend:
              service:
                name: homerun
                port:
                  name: api
