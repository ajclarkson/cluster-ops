---
apiVersion: v1
kind: Namespace
metadata:
  name: goldilocks
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: goldilocks
spec:
  chart:
    spec:
      chart: goldilocks
      version: "10.4.1"
      sourceRef:
        kind: HelmRepository
        name: fairwinds-stable
        namespace: flux-system
  interval: 15m
  releaseName: goldilocks
  targetNamespace: goldilocks
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1
  values:
    controller:
      flags:
        on-by-default: true

    dashboard:
      replicaCount: 1
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
          nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"
        hosts:
          - host: goldilocks.${local_ingress_domain}
            paths:
              - path: /
                type: Prefix
        tls:
          - hosts:
              - goldilocks.${local_ingress_domain}
