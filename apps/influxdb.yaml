---
apiVersion: v1
kind: Namespace
metadata:
  name: influxdb
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: influxdb-credentials 
  namespace: influxdb
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
  data:
  - secretKey: admin-token
    remoteRef:
      key: "influxdb-admin-credentials"
      property: admin-token
  - secretKey: admin-password
    remoteRef:
      key: "influxdb-admin-credentials"
      property: admin-password
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: influxdb
  namespace: influxdb
spec:
  chart:
    spec:
      chart: influxdb2
      version: "2.1.2"
      sourceRef:
        kind: HelmRepository
        name: influxdata
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: influxdb
  targetNamespace: influxdb
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1
  values:
    persistence:
      enabled: true
      size: 8Gi

    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 512Mi

    adminUser:
      user: ajclarkson
      organization: rackman
      existingSecret: influxdb-credentials

    ingress:
      enabled: true
      hostname: influxdb.${local_ingress_domain}
      className: nginx
      annotations:
        nginx.org/websocket-services: influxdb

      tls: true
