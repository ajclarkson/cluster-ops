---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-kube-state-metrics
  namespace: k8s-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flux-kube-state-metrics
rules:
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flux-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: flux-kube-state-metrics
    namespace: k8s-monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flux-kube-state-metrics-config
  namespace: k8s-monitoring
data:
  custom-resource-state.yaml: |
    spec:
      resources:
        - groupVersionKind:
            group: kustomize.toolkit.fluxcd.io
            version: v1
            kind: Kustomization
          metricNamePrefix: gotk
          labelsFromPath:
            name: [metadata, name]
            namespace: [metadata, namespace]
          metrics:
            - name: kustomization_info
              help: "Flux Kustomization ready state"
              each:
                type: Info
                info:
                  labelsFromPath:
                    ready: [status, conditions, "[type=Ready]", status]
        - groupVersionKind:
            group: helm.toolkit.fluxcd.io
            version: v2
            kind: HelmRelease
          metricNamePrefix: gotk
          labelsFromPath:
            name: [metadata, name]
            namespace: [metadata, namespace]
          metrics:
            - name: helmrelease_info
              help: "Flux HelmRelease ready state"
              each:
                type: Info
                info:
                  labelsFromPath:
                    ready: [status, conditions, "[type=Ready]", status]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flux-kube-state-metrics
  namespace: k8s-monitoring
  labels:
    app.kubernetes.io/name: flux-kube-state-metrics
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flux-kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flux-kube-state-metrics
    spec:
      serviceAccountName: flux-kube-state-metrics
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0
          args:
            - --port=8080
            - --custom-resource-state-only=true
            - --custom-resource-state-config-file=/config/custom-resource-state.yaml
          ports:
            - name: metrics
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: flux-kube-state-metrics-config
---
apiVersion: v1
kind: Service
metadata:
  name: flux-kube-state-metrics
  namespace: k8s-monitoring
  labels:
    app.kubernetes.io/name: flux-kube-state-metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
  selector:
    app.kubernetes.io/name: flux-kube-state-metrics
