---
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: rackman
  namespace: keycloak
spec:
  keycloakCRName: keycloak
  realm:
    realm: rackman
    enabled: true
    sslRequired: external
    bruteForceProtected: true
    registrationAllowed: false
    registrationEmailAsUsername: false
    rememberMe: false
    verifyEmail: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    resetPasswordAllowed: false
    editUsernameAllowed: false
    accessTokenLifespan: 300
    ssoSessionIdleTimeout: 1800
    ssoSessionMaxLifespan: 36000

    groups:
      - name: admins
      - name: users

    clientScopes:
      - name: groups
        description: Group membership claims for role mapping
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "false"
        protocolMappers:
          - name: groups
            protocol: openid-connect
            protocolMapper: oidc-group-membership-mapper
            consentRequired: false
            config:
              full.path: "false"
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: groups
              userinfo.token.claim: "true"

    identityProviders:
      - alias: google
        providerId: google
        enabled: true
        updateProfileFirstLoginMode: "off"
        trustEmail: false
        storeToken: false
        addReadTokenRoleOnCreate: false
        authenticateByDefault: false
        linkOnly: false
        hideOnLogin: false
        firstBrokerLoginFlowAlias: Google-First-Broker
        config:
          acceptsPromptNoneForwardFromClient: "false"
          clientId: "1054993587116-c5850t3omtnter0pvkul8avbn5329oov.apps.googleusercontent.com"
          clientSecret: "${KEYCLOAK_GOOGLE_CLIENT_SECRET}"
          disableUserInfo: "false"
          filteredByClaim: "false"
          syncMode: LEGACY
          caseSensitiveOriginalUsername: "false"

    clients:
      - clientId: oauth2-proxy
        name: oauth2-proxy
        enabled: true
        clientAuthenticatorType: client-secret
        secret: "${KEYCLOAK_OAUTH2_PROXY_CLIENT_SECRET}"
        redirectUris:
          - "https://oauth2.local.clarksons.me/oauth2/callback"
          - "https://oauth2.clarksons.me/oauth2/callback"
        webOrigins:
          - "https://oauth2.local.clarksons.me"
          - "https://oauth2.clarksons.me"
        standardFlowEnabled: true
        implicitFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        publicClient: false
        frontchannelLogout: true
        protocol: openid-connect
        fullScopeAllowed: true
        attributes:
          backchannel.logout.session.required: "true"
          backchannel.logout.revoke.offline.tokens: "false"
        protocolMappers:
          - name: aud-mapper-oauth2-proxy
            protocol: openid-connect
            protocolMapper: oidc-audience-mapper
            consentRequired: false
            config:
              included.client.audience: oauth2-proxy
              id.token.claim: "true"
              access.token.claim: "true"
              introspection.token.claim: "true"
        defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - basic
          - email
        optionalClientScopes:
          - address
          - phone
          - offline_access
          - organization
          - microprofile-jwt

      - clientId: claude-code
        name: claude-code
        description: "Service account for Claude Code to access Node-RED API via oauth2-proxy"
        enabled: true
        clientAuthenticatorType: client-secret
        secret: "${KEYCLOAK_CLAUDE_CODE_CLIENT_SECRET}"
        redirectUris: []
        webOrigins: []
        standardFlowEnabled: false
        implicitFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: true
        publicClient: false
        frontchannelLogout: true
        protocol: openid-connect
        fullScopeAllowed: true
        attributes:
          backchannel.logout.session.required: "true"
          backchannel.logout.revoke.offline.tokens: "false"
        protocolMappers:
          - name: oauth2-proxy-audience
            protocol: openid-connect
            protocolMapper: oidc-audience-mapper
            consentRequired: false
            config:
              included.client.audience: oauth2-proxy
              id.token.claim: "false"
              access.token.claim: "true"
              introspection.token.claim: "true"
        defaultClientScopes:
          - service_account
          - web-origins
          - acr
          - profile
          - roles
          - basic
          - email
        optionalClientScopes:
          - address
          - phone
          - offline_access
          - organization
          - microprofile-jwt

      - clientId: grafana
        name: grafana
        enabled: true
        clientAuthenticatorType: client-secret
        secret: "${KEYCLOAK_GRAFANA_CLIENT_SECRET}"
        redirectUris:
          - "https://grafana.local.clarksons.me/login/generic_oauth"
          - "https://grafana.clarksons.me/login/generic_oauth"
        webOrigins:
          - "https://grafana.local.clarksons.me"
          - "https://grafana.clarksons.me"
        standardFlowEnabled: true
        implicitFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        publicClient: false
        frontchannelLogout: true
        protocol: openid-connect
        fullScopeAllowed: true
        attributes:
          backchannel.logout.session.required: "true"
          backchannel.logout.revoke.offline.tokens: "false"
        defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - basic
          - email
        optionalClientScopes:
          - address
          - phone
          - offline_access
          - organization
          - microprofile-jwt

      - clientId: home-assistant
        name: home-assistant
        enabled: true
        clientAuthenticatorType: client-secret
        secret: "${KEYCLOAK_HOME_ASSISTANT_CLIENT_SECRET}"
        redirectUris:
          - "https://home.local.clarksons.me/auth/oidc/callback"
          - "https://home.clarksons.me/auth/oidc/callback"
        webOrigins:
          - "https://home.local.clarksons.me"
          - "https://home.clarksons.me"
        standardFlowEnabled: true
        implicitFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        publicClient: false
        frontchannelLogout: true
        protocol: openid-connect
        fullScopeAllowed: true
        attributes:
          backchannel.logout.session.required: "true"
          backchannel.logout.revoke.offline.tokens: "false"
        defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - basic
          - email
          - groups
        optionalClientScopes:
          - address
          - phone
          - offline_access
          - organization
          - microprofile-jwt

    # Denies first-broker-login for all unlinked Google accounts.
    # Users with an existing Google link bypass this flow entirely.
    # New users must be created by an admin and self-link via the account console.
    authenticationFlows:
      - alias: Google-First-Broker
        description: "Denies first-broker-login for all unlinked Google accounts"
        providerId: basic-flow
        topLevel: true
        builtIn: false
        authenticationExecutions:
          - authenticator: deny-access-authenticator
            authenticatorFlow: false
            requirement: REQUIRED
            priority: 10

    users:
      - username: guest
        enabled: true
        emailVerified: false
        credentials:
          - type: password
            value: "${KEYCLOAK_GUEST_PASSWORD}"
            temporary: false
        groups:
          - users
