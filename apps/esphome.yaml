---
apiVersion: v1
kind: Namespace
metadata:
  name: esphome
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: esphome-config
  namespace: esphome
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: esphome
  namespace: esphome
  annotations:
spec:
  type: ClusterIP
  ports:
  - port: 6052
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: esphome
    app.kubernetes.io/instance: esphome
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esphome
  namespace: esphome
  annotations:
    nginx.org/websocket-services: esphome
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
    nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"
spec:
  tls:
    - hosts:
        - "esp.${local_ingress_domain}"
  ingressClassName: nginx
  rules:
    - host: "esp.${local_ingress_domain}"
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: esphome
                port:
                  number: 6052
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esphome
  namespace: esphome
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: esphome
      app.kubernetes.io/instance: esphome
  template:
    metadata:
      labels:
        app.kubernetes.io/name: esphome
        app.kubernetes.io/instance: esphome
    spec:
      serviceAccountName: default
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: esphome
          image: "esphome/esphome:2025.10.1"
          imagePullPolicy: IfNotPresent
          env:
            - name: ESPHOME_DASHBOARD_USE_PING
              value: "true"
          ports:
            - name: http
              containerPort: 6052
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
          livenessProbe:
            tcpSocket:
              port: 6052
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6052
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 6052
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: esphome-config
