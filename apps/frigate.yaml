apiVersion: v1
kind: Namespace
metadata:
  name: frigate
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frigate-tapo-credentials
  namespace: frigate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: "frigate-tapo-credentials"
        property: username
    - secretKey: password
      remoteRef:
        key: "frigate-tapo-credentials"
        property: password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: frigate
data:
  config.yaml: |
    auth:
      enabled: false

    database:
      path: /media/frigate/frigate.db

    mqtt:
      enabled: true
      host: mqtt-mosquitto.mqtt.svc
      port: 1883

    detectors:
      ov:
        type: openvino
        device: AUTO

    model:
      width: 300
      height: 300
      input_tensor: nhwc
      input_pixel_format: bgr
      path: /openvino-model/ssdlite_mobilenet_v2.xml
      labelmap_path: /openvino-model/coco_91cl_bkgr.txt

    go2rtc:
      streams:
        home_office:
          - rtsp://{FRIGATE_TAPO_USERNAME}:{FRIGATE_TAPO_PASSWORD}@10.0.0.61:554/stream1
        home_office_sub:
          - "ffmpeg:home_office#video=h264#width=640#height=360#raw=-r 5"
        kitchen:
          - rtsp://{FRIGATE_TAPO_USERNAME}:{FRIGATE_TAPO_PASSWORD}@10.0.0.62:554/stream1
        kitchen_sub:
          - "ffmpeg:kitchen#video=h264#width=640#height=360#raw=-r 5"
        parlour:
          - rtsp://{FRIGATE_TAPO_USERNAME}:{FRIGATE_TAPO_PASSWORD}@10.0.0.63:554/stream1
        parlour_sub:
          - "ffmpeg:parlour#video=h264#width=640#height=360#raw=-r 5"

    cameras:
      home_office:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/home_office
              input_args: preset-rtsp-restream
              roles:
                - record
            - path: rtsp://127.0.0.1:8554/home_office_sub
              input_args: preset-rtsp-restream
              roles:
                - detect
        detect:
          enabled: true
          width: 640
          height: 360
          fps: 5
        record:
          enabled: true
        snapshots:
          enabled: true

      kitchen:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/kitchen
              input_args: preset-rtsp-restream
              roles:
                - record
            - path: rtsp://127.0.0.1:8554/kitchen_sub
              input_args: preset-rtsp-restream
              roles:
                - detect
        detect:
          enabled: true
          width: 640
          height: 360
          fps: 5
        record:
          enabled: true
        snapshots:
          enabled: true
        zones:
          feeder:
            coordinates: 0.214,0.279,0.393,0.313,0.4,0.773,0.486,0.791,0.74,0.878,0.742,1,0.154,1
            inertia: 5
            loitering_time: 5
            objects:
              - cat

      parlour:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/parlour
              input_args: preset-rtsp-restream
              roles:
                - record
            - path: rtsp://127.0.0.1:8554/parlour_sub
              input_args: preset-rtsp-restream
              roles:
                - detect
        detect:
          enabled: true
          width: 640
          height: 360
          fps: 5
        record:
          enabled: true
        snapshots:
          enabled: true

    record:
      enabled: true
      continuous:
        days: 0
      alerts:
        pre_capture: 5
        post_capture: 10
        retain:
          days: 7
      detections:
        pre_capture: 5
        post_capture: 10
        retain:
          days: 7

    review:
      alerts:
        labels:
          - person
          - cat

    snapshots:
      enabled: true

    objects:
      track:
        - person
        - cat
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-single
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "2880"
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-data
  namespace: frigate
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-single
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: frigate
  namespace: frigate
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: frigate
  serviceName: frigate
  template:
    metadata:
      labels:
        app: frigate
      annotations:
        config-version: "23"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
      securityContext:
        supplementalGroups:
          - 44   # video
          - 992  # render
      containers:
        - name: frigate
          image: ghcr.io/blakeblackshear/frigate:0.17.1
          env:
            - name: FRIGATE_TAPO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: frigate-tapo-credentials
                  key: username
            - name: FRIGATE_TAPO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frigate-tapo-credentials
                  key: password
          ports:
            - name: http
              containerPort: 5000
            - name: rtsp
              containerPort: 8554
          volumeMounts:
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
            - name: data
              mountPath: /media/frigate
            - name: dri
              mountPath: /dev/dri
            - name: shm
              mountPath: /dev/shm
          securityContext:
            privileged: false
          resources:
            requests:
              memory: 2Gi
              cpu: 1000m
            limits:
              memory: 4Gi
              cpu: 4000m
      volumes:
        - name: config
          configMap:
            name: frigate-config
        - name: data
          persistentVolumeClaim:
            claimName: frigate-data
        - name: dri
          hostPath:
            path: /dev/dri
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frigate
  namespace: frigate
spec:
  type: ClusterIP
  selector:
    app: frigate
  ports:
    - name: http
      port: 5000
      targetPort: http
    - name: rtsp
      port: 8554
      targetPort: rtsp
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frigate
  namespace: frigate
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
    nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"
spec:
  ingressClassName: nginx
  rules:
    - host: frigate.${local_ingress_domain}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frigate
                port:
                  name: http
