apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-monitoring-alloy-metrics
  namespace: k8s-monitoring
spec:
  template:
    spec:
      containers:
        - name: k8s-monitoring-alloy-metrics # Must match the container name in your base manifest
          resources:
            limits:
              memory: "512Mi" # The new memory limit
            requests:
              memory: "256Mi" # The new memory request