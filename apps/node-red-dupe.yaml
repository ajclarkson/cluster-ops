---
apiVersion: v1
kind: Namespace
metadata:
  name: node-red-test
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: node-red-data
  namespace: node-red-test
  labels:
    app.kubernetes.io/instance: node-red
    app.kubernetes.io/name: node-red
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: node-red
  namespace: node-red-test
  labels:
  annotations:
spec:
  type: ClusterIP
  ports:
  - port: 1880
    targetPort: 1880
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: node-red
    app.kubernetes.io/instance: node-red
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-red
  namespace: node-red-test
  annotations:
    nginx.org/websocket-services: node-red
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
    nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"
spec:
  ingressClassName: nginx
  rules:
  - host: red2.${local_ingress_domain}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: node-red
            port:
              number: 1880
  tls:
    - hosts:
        - red2.${local_ingress_domain}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-red
  namespace: node-red-test
  labels:
    app.kubernetes.io/instance: node-red
    app.kubernetes.io/name: node-red
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: node-red
      app.kubernetes.io/name: node-red
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: node-red
        app.kubernetes.io/name: node-red
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: node-red
        image: nodered/node-red:4.1.1-22-minimal
        imagePullPolicy: Always
        ports:
        - containerPort: 1880
          name: http
        securityContext:
          privileged: true
        volumeMounts:
        - name: node-red-data
          mountPath: /data
        env:
        - name: TZ
          value: "${cluster_tz}"
      volumes:
      - name: node-red-data
        persistentVolumeClaim:
          claimName: node-red-data
