---
apiVersion: v1
kind: Namespace
metadata:
  name: fluent-bit
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: fluent-bit
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Parsers_File  parsers.conf

    # Subscribe to Node-RED events on MQTT
    [INPUT]
        Name          mqtt
        Tag           home.events
        Broker        mosquitto.mqtt.svc.cluster.local
        Port          1883
        Topics        home/events
        Format        json

    # Optional: if any events are malformed, keep Fluent Bit alive
    # (Format json already parses; this is just a safety net)
    [FILTER]
        Name          modify
        Match         home.events
        Add           job home-automation

    # Send to Loki via gateway (distributed Loki)
    [OUTPUT]
        Name          loki
        Match         home.events
        Host          loki-gateway.loki.svc.cluster.local
        Port          80
        URI           /loki/api/v1/push

        # Keep labels low-cardinality
        Labels        job=home-automation
        LabelKeys     subsystem,location,event_type

        # Store full JSON event as the log line
        Line_Format   json

  parsers.conf: |
    # MQTT input with Format json will parse automatically.
    # This file exists so Parsers_File points somewhere valid.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluent-bit
  namespace: fluent-bit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:3.0.7
          imagePullPolicy: IfNotPresent
          args:
            - /fluent-bit/bin/fluent-bit
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config

