---
apiVersion: v1
kind: Namespace
metadata:
  name: grafana
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-credentials 
  namespace: grafana
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
  data:
  - secretKey: user
    remoteRef:
      key: "grafana-user-credentials"
      property: username
  - secretKey: password
    remoteRef:
      key: "grafana-user-credentials"
      property: password
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  chart:
    spec:
      chart: grafana
      version: "10.5.15"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: grafana
  targetNamespace: grafana
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1
  values:
    # client_secret is injected by Flux substituteFrom at apply time, never in git
    assertNoLeakedSecrets: false

    deploymentStrategy:
      type: Recreate

    persistence:
      enabled: true
      size: 5Gi

    admin:
      existingSecret: grafana-credentials
      userKey: user
      passwordKey: password

    grafana.ini:
      server:
        root_url: https://grafana.${external_ingress_domain}
      users:
        auto_assign_org_role: Admin
      auth:
        # allows linking OAuth identity to an existing local user matched by email
        oauth_allow_insecure_email_lookup: true
      auth.generic_oauth:
        enabled: true
        name: Keycloak
        allow_sign_up: true
        client_id: grafana
        client_secret: "${KEYCLOAK_GRAFANA_CLIENT_SECRET}"
        scopes: openid email profile roles
        email_attribute_path: email
        login_attribute_path: preferred_username
        name_attribute_path: name
        auth_url: https://sso.${external_ingress_domain}/realms/rackman/protocol/openid-connect/auth
        token_url: https://sso.${external_ingress_domain}/realms/rackman/protocol/openid-connect/token
        api_url: https://sso.${external_ingress_domain}/realms/rackman/protocol/openid-connect/userinfo
        skip_org_role_sync: true
        use_pkce: true

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            uid: loki
            access: proxy
            url: http://loki-read-headless.loki.svc.cluster.local:3100
          - name: prometheus
            type: prometheus
            uid: cf6z4wiex30u8e
            access: proxy
            url: http://mimir-gateway.mimir.svc/prometheus

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-local
  namespace: grafana
  annotations:
    nginx.org/websocket-services: grafana
spec:
  ingressClassName: nginx
  rules:
  - host: grafana.${local_ingress_domain}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 80

