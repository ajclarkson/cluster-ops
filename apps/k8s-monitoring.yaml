---
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-monitoring
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: k8s-monitoring
spec:
  chart:
    spec:
      chart: k8s-monitoring
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: k8s-monitoring
  targetNamespace: k8s-monitoring

  # Patch rendered resources (Helm output) before applying them
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: apps/v1
              kind: StatefulSet
              name: k8s-monitoring-alloy-metrics
              namespace: k8s-monitoring
            patch: |-
              - op: add
                path: /spec/template/spec/nodeSelector
                value:
                  workload: observability

  values:
    cluster:
      name: k8s-monitoring

    destinations:
      - name: mimir
        type: prometheus
        url: http://mimir-nginx.mimir.svc/api/v1/push
      - name: loki
        type: loki
        url: http://loki-gateway.loki/loki/api/v1/push

    clusterMetrics:
      enabled: true
      destinations:
        - mimir

    prometheusOperatorObjects:
      enabled: true
      destinations:
        - mimir
      crds:
        deploy: true
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 500m

    clusterEvents:
      enabled: true
      collector: alloy-logs

    nodeLogs:
      enabled: true
      destinations:
        - loki

    podLogs:
      enabled: true
      destinations:
        - loki

    alloy-metrics:
      enabled: true
      resources:
        requests:
          memory: 500Mi
          cpu: 100m
        limits:
          memory: 1Gi
          cpu: 250m

    alloy-logs:
      enabled: true
      nodeSelector:
        logging: "true"

      # Append extra River config to the generated Alloy config
      extraConfig: |-
        // --- HOME EVENTS PIPELINE (ONLY mqtt-events-bridge pods) ---

        discovery.kubernetes "home_events_pods" {
          role = "pod"
          selectors {
            role  = "pod"
            label = "app=mqtt-events-bridge"
          }
        }

        discovery.relabel "home_events_keep" {
          targets = discovery.kubernetes.home_events_pods.targets

          // Keep only containers that actually have logs
          rule {
            action = "keep"
            source_labels = ["__meta_kubernetes_pod_label_app"]
            regex = "mqtt-events-bridge"
          }
        }

        loki.source.kubernetes "home_events" {
          targets    = discovery.relabel.home_events_keep.output
          forward_to = [loki.process.home_events.receiver]
        }

        loki.process "home_events" {
          // Parse JSON event body into extracted fields
          stage.json {
            expressions = {
              subsystem   = "subsystem",
              location    = "location",
              event_type  = "event_type",
              outputs_result = "outputs.result",
              correlation = "correlation_id",
              decision    = "decision",
              reason      = "reason",
            }
          }

          // Promote only stable, bounded-cardinality fields as LABELS
          stage.labels {
            values = {
              stream     = "home_events",
              subsystem  = "subsystem",
              location   = "location",
              event_type = "event_type",
              outputs_result = "outputs_result",
            }
          }

          // Optional: keep correlation_id as *field*, not label (useful but can be high-cardinality)
          // stage.structured_metadata { values = { correlation_id = "correlation" } }

          forward_to = [loki.write.loki.receiver]
        }


    prometheus:
      replicas: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 512Mi
          cpu: 500m

