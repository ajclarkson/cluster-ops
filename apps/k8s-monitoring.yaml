---
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-monitoring
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: k8s-monitoring
spec:
  chart:
    spec:
      chart: k8s-monitoring
      version: "4.1.4"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: k8s-monitoring
  targetNamespace: k8s-monitoring
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1

  values:
    destinations:
      mimir:
        type: prometheus
        url: http://mimir-gateway.mimir.svc/api/v1/push
      loki:
        type: loki
        url: http://loki-gateway.loki/loki/api/v1/push

    collectors:
      alloy-metrics:
        presets:
          - clustered
          - statefulset
        alloy:
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 500Mi
              cpu: 250m
        controller:
          nodeSelector:
            workload: observability

      alloy-logs:
        presets:
          - filesystem-log-reader
          - daemonset
        nodeSelector:
          logging: 'true'
        alloy:
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
        
        # Append extra River config to the generated Alloy config
        extraConfig: |-
          // --- HOME EVENTS PIPELINE (ONLY mqtt-events-bridge pods) ---

          discovery.kubernetes "home_events_pods" {
            role = "pod"
            selectors {
              role  = "pod"
              label = "app=mqtt-events-bridge"
            }
          }

          discovery.relabel "home_events_keep" {
            targets = discovery.kubernetes.home_events_pods.targets

            // Keep only containers that actually have logs
            rule {
              action = "keep"
              source_labels = ["__meta_kubernetes_pod_label_app"]
              regex = "mqtt-events-bridge"
            }
          }

          loki.source.kubernetes "home_events" {
            targets    = discovery.relabel.home_events_keep.output
            forward_to = [loki.process.home_events.receiver]
          }

          loki.process "home_events" {
            // Parse JSON event body into extracted fields
            stage.json {
              expressions = {
                subsystem   = "subsystem",
                location    = "location",
                event_type  = "event_type",
                outputs_result = "outputs.result",
                correlation = "correlation_id",
                decision    = "decision",
                reason      = "reason",
              }
            }

            // Promote only stable, bounded-cardinality fields as LABELS
            stage.labels {
              values = {
                stream     = "home_events",
                subsystem  = "subsystem",
                location   = "location",
                event_type = "event_type",
                outputs_result = "outputs_result",
              }
            }

            // Optional: keep correlation_id as *field*, not label (useful but can be high-cardinality)
            // stage.structured_metadata { values = { correlation_id = "correlation" } }

            forward_to = [loki.write.loki.receiver]
          }

    clusterMetrics:
      enabled: true
      destinations:
        - mimir
      collector: alloy-metrics

    telemetryServices:
      kube-state-metrics:
        deploy: true

    cluster:
      name: k8s-monitoring

    prometheusOperatorObjects:
      enabled: true
      destinations:
        - mimir
      crds:
        deploy: true
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 500m
      collector: alloy-metrics

    clusterEvents:
      enabled: true
      collector: alloy-logs

    nodeLogs:
      enabled: true
      destinations:
        - loki
      collector: alloy-logs

    podLogsViaLoki:
      enabled: true
      destinations:
        - loki
      collector: alloy-logs

    prometheus:
      replicas: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 512Mi
          cpu: 500m

