---
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-monitoring
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: k8s-monitoring
spec:
  chart:
    spec:
      chart: k8s-monitoring
      version: "4.2.2"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: k8s-monitoring
  targetNamespace: k8s-monitoring
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1

  values:
    destinations:
      mimir:
        type: prometheus
        url: http://mimir-gateway.mimir.svc/api/v1/push
      loki:
        type: loki
        url: http://loki-gateway.loki/loki/api/v1/push

    collectors:
      alloy-metrics:
        presets:
          - clustered
          - statefulset
        alloy:
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 500Mi
              cpu: 250m
        controller:
          nodeSelector:
            workload: observability
        extraConfig: |-
          prometheus.scrape "zigbee2mqtt_exporter" {
            targets = [{__address__ = "zigbee2mqtt-exporter.zigbee2mqtt.svc:8087"}]
            metrics_path    = "/metrics"
            scrape_interval = "60s"
            job_name        = "zigbee2mqtt"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          discovery.kubernetes "flux_pods" {
            role = "pod"
            namespaces {
              names = ["flux-system"]
            }
          }

          discovery.relabel "flux_metrics" {
            targets = discovery.kubernetes.flux_pods.targets

            rule {
              action        = "keep"
              source_labels = ["__meta_kubernetes_pod_phase"]
              regex         = "Running"
            }

            rule {
              action        = "keep"
              source_labels = ["__meta_kubernetes_pod_label_app"]
              regex         = "helm-controller|kustomize-controller|source-controller|notification-controller"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_ip"]
              target_label  = "__address__"
              regex         = "(.+)"
              replacement   = "$1:8080"
            }
          }

          prometheus.scrape "flux_kube_state_metrics" {
            targets = [{__address__ = "flux-kube-state-metrics.k8s-monitoring.svc.cluster.local:8080"}]
            metrics_path    = "/metrics"
            scrape_interval = "60s"
            job_name        = "flux-kube-state-metrics"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          prometheus.scrape "flux_controllers" {
            targets         = discovery.relabel.flux_metrics.output
            metrics_path    = "/metrics"
            scrape_interval = "60s"
            job_name        = "flux-system"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          discovery.kubernetes "x509_exporter" {
            role = "pod"
            namespaces {
              names = ["x509-certificate-exporter"]
            }
          }

          discovery.relabel "x509_exporter" {
            targets = discovery.kubernetes.x509_exporter.targets

            rule {
              action        = "keep"
              source_labels = ["__meta_kubernetes_pod_phase"]
              regex         = "Running"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_ip"]
              target_label  = "__address__"
              regex         = "(.+)"
              replacement   = "$1:9793"
            }
          }

          prometheus.scrape "x509_exporter" {
            targets         = discovery.relabel.x509_exporter.output
            metrics_path    = "/metrics"
            scrape_interval = "300s"
            job_name        = "x509-certificate-exporter"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          discovery.kubernetes "reloader" {
            role = "pod"
            namespaces {
              names = ["reloader"]
            }
          }

          discovery.relabel "reloader" {
            targets = discovery.kubernetes.reloader.targets

            rule {
              action        = "keep"
              source_labels = ["__meta_kubernetes_pod_phase"]
              regex         = "Running"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_ip"]
              target_label  = "__address__"
              regex         = "(.+)"
              replacement   = "$1:9090"
            }
          }

          // Blackbox probes — http_200 targets (no oauth2-proxy)
          prometheus.scrape "blackbox_200" {
            targets = [
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://home.local.clarksons.me/", __param_module = "http_200", instance = "home-assistant"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://minio.local.clarksons.me/", __param_module = "http_200", instance = "minio"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://influxdb.local.clarksons.me/", __param_module = "http_200", instance = "influxdb"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://10.0.0.50:6443/healthz", __param_module = "http_200_insecure", instance = "k8s-api"},
            ]
            metrics_path    = "/probe"
            scrape_interval = "60s"
            job_name        = "blackbox"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          // Blackbox probes — http_302 targets (behind oauth2-proxy)
          prometheus.scrape "blackbox_302" {
            targets = [
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://hub.local.clarksons.me/", __param_module = "http_302", instance = "zigbee2mqtt"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://frigate.local.clarksons.me/", __param_module = "http_302", instance = "frigate"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://grafana.local.clarksons.me/", __param_module = "http_302", instance = "grafana"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://goldilocks.local.clarksons.me/", __param_module = "http_302", instance = "goldilocks"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://longhorn.local.clarksons.me/", __param_module = "http_302", instance = "longhorn"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://sso.local.clarksons.me/", __param_module = "http_302", instance = "keycloak"},
              {__address__ = "blackbox-exporter-prometheus-blackbox-exporter.blackbox-exporter.svc.cluster.local:9115", __param_target = "https://status.local.clarksons.me/", __param_module = "http_302", instance = "homepage"},
            ]
            metrics_path    = "/probe"
            scrape_interval = "60s"
            job_name        = "blackbox"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          prometheus.scrape "reloader" {
            targets         = discovery.relabel.reloader.output
            metrics_path    = "/metrics"
            scrape_interval = "60s"
            job_name        = "reloader"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          discovery.kubernetes "longhorn_manager" {
            role = "pod"
            namespaces {
              names = ["longhorn-system"]
            }
          }

          discovery.relabel "longhorn_manager" {
            targets = discovery.kubernetes.longhorn_manager.targets

            rule {
              action        = "keep"
              source_labels = ["__meta_kubernetes_pod_phase"]
              regex         = "Running"
            }

            rule {
              action        = "keep"
              source_labels = ["__meta_kubernetes_pod_label_app"]
              regex         = "longhorn-manager"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_ip"]
              target_label  = "__address__"
              regex         = "(.+)"
              replacement   = "$1:9500"
            }
          }

          prometheus.scrape "longhorn" {
            targets         = discovery.relabel.longhorn_manager.output
            metrics_path    = "/metrics"
            scrape_interval = "60s"
            job_name        = "longhorn"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          prometheus.scrape "coredns" {
            targets = [{__address__ = "kube-dns.kube-system.svc.cluster.local:9153"}]
            metrics_path    = "/metrics"
            scrape_interval = "60s"
            job_name        = "coredns"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          discovery.kubernetes "ingress_nginx" {
            role = "pod"
            namespaces {
              names = ["ingress-nginx"]
            }
          }

          discovery.relabel "ingress_nginx" {
            targets = discovery.kubernetes.ingress_nginx.targets

            rule {
              action        = "keep"
              source_labels = ["__meta_kubernetes_pod_phase"]
              regex         = "Running"
            }

            rule {
              action        = "keep"
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              regex         = "ingress-nginx"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_ip"]
              target_label  = "__address__"
              regex         = "(.+)"
              replacement   = "$1:10254"
            }
          }

          prometheus.scrape "ingress_nginx" {
            targets         = discovery.relabel.ingress_nginx.output
            metrics_path    = "/metrics"
            scrape_interval = "60s"
            job_name        = "ingress-nginx"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

          prometheus.scrape "homerun" {
            targets         = [{__address__ = "homerun.homerun.svc:7070"}]
            metrics_path    = "/metrics"
            scrape_interval = "60s"
            job_name        = "homerun"
            forward_to      = [prometheus.remote_write.mimir.receiver]
          }

      alloy-logs:
        presets:
          - filesystem-log-reader
          - daemonset
        nodeSelector:
          logging: 'true'
        alloy:
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m

        # Append extra River config to the generated Alloy config
        extraConfig: |-
          // --- HOME EVENTS PIPELINE (ONLY mqtt-events-bridge pods) ---

          discovery.kubernetes "home_events_pods" {
            role = "pod"
            selectors {
              role  = "pod"
              label = "app=mqtt-events-bridge"
            }
          }

          discovery.relabel "home_events_keep" {
            targets = discovery.kubernetes.home_events_pods.targets

            // Keep only containers that actually have logs
            rule {
              action = "keep"
              source_labels = ["__meta_kubernetes_pod_label_app"]
              regex = "mqtt-events-bridge"
            }
          }

          loki.source.kubernetes "home_events" {
            targets    = discovery.relabel.home_events_keep.output
            forward_to = [loki.process.home_events.receiver]
          }

          loki.process "home_events" {
            // Parse JSON event body into extracted fields
            stage.json {
              expressions = {
                subsystem   = "subsystem",
                location    = "location",
                event_type  = "event_type",
                outputs_result = "outputs.result",
                correlation = "correlation_id",
                decision    = "decision",
                reason      = "reason",
                bridge      = "_bridge",
              }
            }

            // Promote only stable, bounded-cardinality fields as LABELS
            stage.labels {
              values = {
                stream     = "home_events",
                subsystem  = "subsystem",
                location   = "location",
                event_type = "event_type",
                outputs_result = "outputs_result",
                bridge     = "bridge",
              }
            }

            // Optional: keep correlation_id as *field*, not label (useful but can be high-cardinality)
            // stage.structured_metadata { values = { correlation_id = "correlation" } }

            forward_to = [loki.write.loki.receiver]
          }

    clusterMetrics:
      enabled: true
      destinations:
        - mimir
      collector: alloy-metrics

    hostMetrics:
      enabled: true
      destinations:
        - mimir
      collector: alloy-metrics
      linuxHosts:
        enabled: true

    telemetryServices:
      kube-state-metrics:
        deploy: true
      node-exporter:
        deploy: true

    cluster:
      name: k8s-monitoring

    prometheusOperatorObjects:
      enabled: true
      destinations:
        - mimir
      crds:
        deploy: true
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 500m
      collector: alloy-metrics

    clusterEvents:
      enabled: true
      collector: alloy-logs

    nodeLogs:
      enabled: true
      destinations:
        - loki
      collector: alloy-logs

    podLogsViaLoki:
      enabled: true
      destinations:
        - loki
      collector: alloy-logs

    prometheus:
      replicas: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 512Mi
          cpu: 500m

