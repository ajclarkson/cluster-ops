---
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-monitoring
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: k8s-monitoring
spec:
  chart:
    spec:
      chart: k8s-monitoring
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: k8s-monitoring
  targetNamespace: k8s-monitoring
  values:
    cluster:
      name: k8s-monitoring

    destinations:
      - name: mimir
        type: prometheus
        url: http://mimir-nginx.mimir.svc/api/v1/push
      - name: loki
        type: loki
        url: http://loki-gateway.loki/loki/api/v1/push

    clusterMetrics:
      enabled: true
      destinations:
        - mimir

    prometheusOperatorObjects:
      enabled: true
      destinations:
        - mimir
      crds:
        deploy: true
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 500m

    clusterEvents:
      enabled: true
      collector: alloy-logs

    nodeLogs:
      enabled: true
      destinations:
        - loki

    podLogs:
      enabled: true
      destinations:
        - loki

    alloy-metrics:
      enabled: true
      resources:
        requests:
          memory: 500Mi
          cpu: 100m
        limits:
          memory: 1Gi
          cpu: 250m

    alloy-logs:
      enabled: true
      nodeSelector:
        logging: "true"
      # Keep Alloy-Logs running per node for full log coverage

    prometheus:
      replicas: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 512Mi
          cpu: 500m

  postBuild:
    patches:
      - target:
          kind: Alloy
          name: k8s-monitoring-alloy-metrics
          namespace: k8s-monitoring
        patch: |
          apiVersion: monitoring.grafana.com/v1alpha1
          kind: Alloy
          metadata:
            name: k8s-monitoring-alloy-metrics
            namespace: k8s-monitoring
          spec:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi