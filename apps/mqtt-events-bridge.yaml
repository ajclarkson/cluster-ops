---
apiVersion: v1
kind: Namespace
metadata:
  name: mqtt-events-bridge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-events-bridge
  namespace: mqtt-events-bridge
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: mqtt-events-bridge
  template:
    metadata:
      labels:
        app: mqtt-events-bridge
    spec:
      containers:
        - name: mosquitto-sub
          image: eclipse-mosquitto:2.0.22
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              echo "Starting mqtt-events-bridge...";
              while true; do
                mosquitto_sub \
                  -h mqtt-mosquitto.mqtt \
                  -p 1883 \
                  -t 'home/events' \
                  -t 'homerun/events' \
                  -q 0 \
                  -R \
                  -v \
                | while IFS= read -r line; do
                    topic="$${line%% *}"
                    payload="$${line#* }"
                    case "$$topic" in
                      home/events)    src="node-red" ;;
                      homerun/events) src="homerun" ;;
                      *)              src="unknown" ;;
                    esac
                    printf '{"_source":"%s",%s\n' "$$src" "$${payload#\{}"
                  done;
                echo "mosquitto_sub exited; restarting in 2s..." >&2
                sleep 2
              done
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi

