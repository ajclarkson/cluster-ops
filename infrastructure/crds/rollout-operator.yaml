---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zoneawarepoddisruptionbudgets.rollout-operator.grafana.com
spec:
  group: rollout-operator.grafana.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - selector
            properties:
              maxUnavailable:
                type: integer
                minimum: 0
              maxUnavailablePercentage:
                type: integer
                minimum: 0
                maximum: 100
              selector:
                type: object
                required:
                - matchLabels
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
              podNamePartitionRegex:
                type: string
              podNameRegexGroup:
                type: integer
                minimum: 1
              crossZoneEvictionDelay:
                type: string
    subresources:
      status: {}
  scope: Namespaced
  names:
    kind: ZoneAwarePodDisruptionBudget
    plural: zoneawarepoddisruptionbudgets
    singular: zoneawarepoddisruptionbudget
    shortNames:
    - zpdb
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: replicatemplates.rollout-operator.grafana.com
spec:
  group: rollout-operator.grafana.com
  versions:
  - name: v1
    served: true
    storage: true
    additionalPrinterColumns:
    - description: Status replicas
      jsonPath: .status.replicas
      name: StatusReplicas
      type: string
    - description: Spec replicas
      jsonPath: .spec.replicas
      name: SpecReplicas
      type: string
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              replicas:
                type: integer
                default: 1
                minimum: 0
              labelSelector:
                type: string
          status:
            type: object
            properties:
              replicas:
                type: integer
    subresources:
      status: {}
    scale:
      specReplicasPath: .spec.replicas
      statusReplicasPath: .status.replicas
      labelSelectorPath: .spec.labelSelector
  scope: Namespaced
  names:
    plural: replicatemplates
    singular: replicatemplate
    kind: ReplicaTemplate
  categories:
  - all
