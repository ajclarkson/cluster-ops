---
apiVersion: v1
kind: Namespace
metadata:
  name: vpa
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpa
  namespace: vpa
spec:
  chart:
    spec:
      chart: vpa
      version: "4.12.3"
      sourceRef:
        kind: HelmRepository
        name: fairwinds-stable
        namespace: flux-system
  interval: 15m
  releaseName: vpa
  targetNamespace: vpa
  values:
    recommender:
      enabled: true
    updater:
      enabled: false
    admissionController:
      enabled: false
