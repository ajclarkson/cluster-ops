---
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  chart:
    spec:
      chart: ingress-nginx
      version: "4.13.2"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: ingress-nginx
  targetNamespace: ingress-nginx
  values:
    controller:
      service:
        loadBalancerIP: "${web_ingress_ip}"
      extraArgs:
        default-ssl-certificate: "cert-manager/local.clarksons.me-tls"
