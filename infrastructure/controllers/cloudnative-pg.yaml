---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudnative-pg
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cloudnative-pg
spec:
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.2"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: cloudnative-pg
  targetNamespace: cloudnative-pg
  values:
    crds:
      create: true

    monitoring:
      podMonitorEnabled: false
