---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-vip
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-vip
  namespace: kube-vip
spec:
  chart:
    spec:
      chart: kube-vip
      version: "0.9.9"
      sourceRef:
        kind: HelmRepository
        name: kube-vip
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: kube-vip
  targetNamespace: kube-vip
  values:
    config:
      address: "${external_vip}"

    env:
      vip_interface: "eth0"
      vip_arp: "true"
      lb_enable: "true"
      lb_port: "6443"
      vip_cidr: "32"
      cp_enable: "true"
      svc_enable: "true"
      svc_election: "true"
      vip_leaderelection: "true"
      vip_leaseduration: "5"

    serviceAccount:
      # Specifies whether a service account should be created
      create: true
      # Annotations to add to the service account
      annotations: {}
      # The name of the service account to use.
      # If not set and create is true, a name is generated using the fullname template
      name: "kube-vip"

    affinity: {}
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-role.kubernetes.io/master
            operator: Exists
        - matchExpressions:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists

    securityContext:
      capabilities:
        add:
          - NET_ADMIN
          - NET_RAW

    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-vip-cloud-provider
  namespace: kube-vip
spec:
  chart:
    spec:
      chart: kube-vip-cloud-provider
      version: "0.2.10"
      sourceRef:
        kind: HelmRepository
        name: kube-vip
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: kube-vip-cloud-provider
  targetNamespace: kube-vip
  values:
    cm:
      data:
        range-global: 10.0.0.30-10.0.0.39

