---
apiVersion: v1
kind: Namespace
metadata:
  name: reloader
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  chart:
    spec:
      chart: reloader
      version: "2.2.14"
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
  interval: 15m
  releaseName: reloader
  targetNamespace: reloader
  values:
    reloader:
      autoReloadAll: true
      enableMetricsByNamespace: true
