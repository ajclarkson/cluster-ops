apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      version: "1.11.2"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: longhorn
  targetNamespace: longhorn-system
  values:
    persistence:
      reclaimPolicy: Retain

    # Reduce volume replica count for memory savings
    defaultSettings:
      defaultReplicaCount: 2       # reduce from 3
      snapshotDataRetention: 5     # keep last 5 snapshots per volume
      recurringJobs: []            # disable recurring backups by default

    # Optional: disable features that consume extra memory
      autoSalvage: "true"          # leave enabled for safety
      allowVolumeCreationWithDegradedAvailability: "false"
      backupTarget: ""             # optional: set if you have S3/minio

    # Ingress settings (as before)
    ingress:
      enabled: true
      ingressClassName: nginx
      tls: true
      host: longhorn.local.clarksons.me
      annotations:
        nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
        nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"

    # Limit manager / engine memory usage
    manager:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m

    engine:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
