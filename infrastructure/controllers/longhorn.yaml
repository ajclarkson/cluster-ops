apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn-backblaze-credentials
  namespace: longhorn-system
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
    template:
      data:
        AWS_ACCESS_KEY_ID: "{{ .keyID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .applicationKey }}"
        AWS_ENDPOINTS: "https://s3.eu-central-003.backblazeb2.com"
  data:
    - secretKey: keyID
      remoteRef:
        key: "rackman-backblaze-credentials"
        property: keyID
    - secretKey: applicationKey
      remoteRef:
        key: "rackman-backblaze-credentials"
        property: applicationKey
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  interval: 15m
  timeout: 15m
  releaseName: longhorn
  targetNamespace: longhorn-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1
  values:
    persistence:
      reclaimPolicy: Retain

    defaultSettings:
      defaultReplicaCount: 2
      autoSalvage: "true"
      allowVolumeCreationWithDegradedAvailability: "false"
      backupTarget: "s3://rackman-longhorn-backups@eu-central-003/"
      backupTargetCredentialSecret: "longhorn-backblaze-credentials"

    # Ingress settings (as before)
    ingress:
      enabled: true
      ingressClassName: nginx
      tls: true
      host: longhorn.local.clarksons.me
      annotations:
        nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
        nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"

    # Limit manager / engine memory usage
    manager:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m

    engine:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
