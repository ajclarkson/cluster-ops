---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      version: "1.10.1"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: longhorn
  targetNamespace: longhorn-system
  values:
    persistence:
      reclaimPolicy: Retain
    ingress:
      enabled: true
      ingressClassName: nginx
      tls: true
      host: longhorn.local.clarksons.me
      annotations:
        nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
        nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"

