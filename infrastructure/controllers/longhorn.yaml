apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: longhorn
  targetNamespace: longhorn-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |-
              - op: add
                path: /spec/revisionHistoryLimit
                value: 1
  values:
    persistence:
      reclaimPolicy: Retain

    defaultSettings:
      defaultReplicaCount: 2
      autoSalvage: "true"
      allowVolumeCreationWithDegradedAvailability: "false"
      backupTarget: ""

    # Ingress settings (as before)
    ingress:
      enabled: true
      ingressClassName: nginx
      tls: true
      host: longhorn.local.clarksons.me
      annotations:
        nginx.ingress.kubernetes.io/auth-signin: "${oauth_signin_url}"
        nginx.ingress.kubernetes.io/auth-url: "${oauth_url}"

    # Limit manager / engine memory usage
    manager:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m

    engine:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
