---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  chart:
    spec:
      chart: cert-manager
      version: "v1.19.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: cert-manager
  targetNamespace: cert-manager
  values:
    installCRDs: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-credentials 
  namespace: cert-manager
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
  data:
  - secretKey: api-key
    remoteRef:
      key: "cloudflare-api-credentials"
      property: api-key
