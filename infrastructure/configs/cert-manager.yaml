---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01-issuer
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns01-private-key
    solvers:
      - dns01:
          cloudflare:
            email: adam@ajclarkson.co.uk
            apiTokenSecretRef:
              name: cloudflare-api-credentials
              key: api-key
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-credentials
  namespace: cert-manager
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${onepassword_vault_name}"
  target:
    creationPolicy: Owner
  data:
  - secretKey: api-key
    remoteRef:
      key: "cloudflare-api-credentials"
      property: api-key
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ${local_ingress_domain}
  namespace: cert-manager
spec:
  secretName: ${local_ingress_domain}-tls
  issuerRef:
    name: letsencrypt-dns01-issuer
    kind: ClusterIssuer
  dnsNames:
    - '*.${local_ingress_domain}'
    - ${local_ingress_domain}
